{% extends "base.html" %}
{% block title %}Why — News Reader{% endblock %}

{% block head %}
<style>
  .why { max-width: 640px; margin: 0 auto; font-size: 15px; color: var(--muted); }
  .why h1 { font-size: 40px; margin-top: 32px; margin-bottom: 12px; color: var(--text); }
  .why h2 { font-size: 15px; margin-top: 28px; margin-bottom: 10px; color: var(--text); text-transform: none; letter-spacing: normal; }
  .why p { margin-bottom: 12px; line-height: 1.7; color: var(--muted); }
  .why ul, .why ol { padding-left: 20px; margin-bottom: 12px; }
  .why li { margin-bottom: 6px; line-height: 1.6; color: var(--muted); }
  .why strong { color: var(--text); }
</style>
{% endblock %}

{% block content %}
<a href="/" class="backlink muted" style="font-size:13px;">&larr; News Reader</a>
<div class="section why">
  {{ content | safe }}
</div>
{% endblock %}
