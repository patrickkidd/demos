{% macro render(meta, samples, analyzed_samples, headlines, active_sample_id, running_sample_id=None) %}
<div class="tl-wrap" id="tl-wrap-{{ meta.id }}">
  <button class="tl-arrow tl-arrow-left" aria-label="Scroll left">&lsaquo;</button>
  <div class="tl-cards" id="tl-{{ meta.id }}">
    {% for s in samples %}
    <a class="tl-card{% if active_sample_id == s %} active{% endif %}{% if s in analyzed_samples %} analyzed{% elif running_sample_id == s %} in-progress{% endif %}"
       href="/story/{{ meta.id }}/samples/{{ s }}">
      <div class="tl-card-date">{{ s[:4] }}-{{ s[4:6] }}-{{ s[6:8] }}</div>
      {% if headlines.get(s) %}
      <div class="tl-card-head">{{ headlines[s] }}</div>
      {% else %}
      <div class="tl-card-none">Analysis pending</div>
      {% endif %}
    </a>
    {% endfor %}
  </div>
  <button class="tl-arrow tl-arrow-right" aria-label="Scroll right">&rsaquo;</button>
</div>
<script>
(function() {
  var wrap = document.getElementById('tl-wrap-{{ meta.id }}');
  var el = document.getElementById('tl-{{ meta.id }}');
  if (!el || !wrap) return;
  var left = wrap.querySelector('.tl-arrow-left');
  var right = wrap.querySelector('.tl-arrow-right');
  left.addEventListener('click', function() { el.scrollBy({left: -200, behavior: 'smooth'}); });
  right.addEventListener('click', function() { el.scrollBy({left: 200, behavior: 'smooth'}); });
  function updateArrows() {
    left.style.opacity = el.scrollLeft <= 2 ? '0.3' : '1';
    right.style.opacity = el.scrollLeft >= el.scrollWidth - el.offsetWidth - 2 ? '0.3' : '1';
  }
  el.addEventListener('scroll', updateArrows);
  var active = el.querySelector('.tl-card.active');
  requestAnimationFrame(function() {
    if (active) {
      el.scrollLeft = active.offsetLeft - el.offsetWidth / 2 + active.offsetWidth / 2;
    } else {
      el.scrollLeft = el.scrollWidth;
    }
    updateArrows();
  });
})();
</script>
{% endmacro %}
