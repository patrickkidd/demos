{% extends "base.html" %}
{% block title %}Methodology — News Reader{% endblock %}

{% block head %}
<style>
  .methodology { max-width: 640px; margin: 0 auto; font-size: 15px; color: var(--muted); }
  .methodology h1 { font-size: 40px; margin-top: 32px; margin-bottom: 12px; color: var(--text); }
  .methodology h2 { font-size: 15px; margin-top: 28px; margin-bottom: 10px; color: var(--text); text-transform: none; letter-spacing: normal; }
  .methodology h3 { font-size: 14px; margin-top: 20px; margin-bottom: 8px; }
  .methodology p { margin-bottom: 12px; line-height: 1.7; color: var(--muted); }
  .methodology ul, .methodology ol { padding-left: 20px; margin-bottom: 12px; }
  .methodology li { margin-bottom: 6px; line-height: 1.6; color: var(--muted); }
  .methodology strong { color: var(--text); }
  .methodology code { background: var(--border); padding: 2px 5px; border-radius: 3px; font-size: 13px; }
</style>
{% endblock %}

{% block content %}
<a href="/" class="backlink muted" style="font-size:13px;">&larr; News Reader</a>
<div class="section methodology">
  {{ content | safe }}
</div>
{% endblock %}
