{% extends "base.html" %}
{% block title %}Methodology — Demos{% endblock %}

{% block head %}
<style>
  .methodology h1 { font-size: 20px; margin-top: 32px; margin-bottom: 12px; color: var(--text); }
  .methodology h2 { font-size: 15px; margin-top: 28px; margin-bottom: 10px; color: var(--text); text-transform: none; letter-spacing: normal; }
  .methodology h3 { font-size: 14px; margin-top: 20px; margin-bottom: 8px; }
  .methodology p { margin-bottom: 12px; line-height: 1.7; }
  .methodology ul, .methodology ol { padding-left: 20px; margin-bottom: 12px; }
  .methodology li { margin-bottom: 6px; line-height: 1.6; }
  .methodology strong { color: var(--text); }
  .methodology code { background: var(--border); padding: 2px 5px; border-radius: 3px; font-size: 13px; }
</style>
{% endblock %}

{% block content %}
<div class="section methodology">
  {{ content | safe }}
</div>
{% endblock %}
